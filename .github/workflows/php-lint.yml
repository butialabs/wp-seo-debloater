name: PHP Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Lint PHP files
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
